# H2 in-memory database for testing (NO external connection needed)
spring.datasource.url=jdbc:h2:mem:vmsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console for database inspection
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# PostgreSQL (for production - uncomment when network is available)
